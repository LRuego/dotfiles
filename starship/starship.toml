"$schema" = 'https://starship.rs/config-schema.json'

format = """
[](fg:#7aa2f7)\
[](bg:#7aa2f7 fg:#1a1b26)\
$username\
[](bg:#3B4261 fg:#7aa2f7)\
$directory\
${custom.git_transition}\
$git_branch\
$git_status\
${custom.end_git}\
${custom.end_no_git}\
$time\
[](fg:#3d59a1)"""

[username]
style_user = "fg:#1a1b26 bg:#7aa2f7"
style_root = "fg:#f7768e"
format = '[ $user ]($style)'
disabled = false
show_always = true

[directory]
style = "fg:#7aa2f7 bg:#3B4261"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = " "
"Pictures" = " "

[git_branch]
symbol = ""
style = "bg:#9d7cd8"
format = '[[ $symbol $branch ](fg:#1a1b26 bg:#9d7cd8)]($style)'

[git_status]
style = "bg:#9d7cd8"
format = '[[($all_status$ahead_behind )](fg:#1a1b26 bg:#9d7cd8)]($style)'

[time]
disabled = false
time_format = "%R" # Hour:Minute Format
style = "bg:#3d59a1"
format = '[[ $time ](fg:#a0a9cb bg:#3d59a1)]($style)'

# Smart Transitions
[custom.git_transition]
when = "git rev-parse --is-inside-work-tree"
command = "echo"
format = '[](fg:#3B4261 bg:#9d7cd8)'

[custom.end_git]
when = "git rev-parse --is-inside-work-tree"
command = "echo"
format = '[](fg:#9d7cd8 bg:#3d59a1)'

[custom.end_no_git]
when = "! git rev-parse --is-inside-work-tree"
command = "echo"
format = '[](fg:#3B4261 bg:#3d59a1)'

