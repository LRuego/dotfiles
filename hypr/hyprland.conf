# By: LRuego
# --------------------------------------------------------------------------

# Refer to the wiki for more information.
# https://wiki.hypr.land/Configuring/

# Please note not all available settings / options are set here.
# For a full list, see the wiki

# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
# source = ~/.config/hypr/myColors.conf

################
### MONITORS ###
################
                               
# See https://wiki.hypr.land/Configuring/Monitors/
monitor= HDMI-A-1, 1920x1080, 0x0, 1

###################
### MY PROGRAMS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/

# Set programs that you use
$terminal = ghostty
$fileManager = nemo
$menu = "rofi -show drun"


#################
### AUTOSTART ###
#################

exec-once = discord
#exec-once = hyprsunset
exec-once = hyprpaper
exec-once = quickshell
exec-once = wl-clip-persist --clipboard regular
exec-once = wl-paste --type text --watch cliphist store # Stores only text data
exec-once = wl-paste --type image --watch cliphist store # Stores only image data
# Quake Terminal Autostart
exec-once = ghostty --title=quake-terminal --background-opacity=1 --gtk-titlebar=false

#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hypr.land/Configuring/Environment-variables/

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = XCURSOR_THEME,Bibata-Modern-Ice
env = HYPRCURSOR_THEME,Bibata-Modern-Ice
env = LANG,en_US.UTF-8
env = QT_QPA_PLATFORM,wayland


###################
### PERMISSIONS ###
###################

# See https://wiki.hypr.land/Configuring/Permissions/
# Please note permission changes here require a Hyprland restart and are not applied on-the-fly
# for security reasons

ecosystem {
  no_update_news = false
  no_donation_nag = false
  enforce_permissions = false
}

#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hypr.land/Configuring/Variables/

# https://wiki.hypr.land/Configuring/Variables/#general
general {
    gaps_in = 5
    gaps_out = 15, 20, 20, 20
    border_size = 2
    col.active_border = rgba(7aa2f7ee) rgba(c0caf5ee) 45deg
    col.inactive_border = rgba(595959aa)
    col.nogroup_border_active = rgba(7aa2f7ee) rgba(c0caf5ee) 45deg
    col.nogroup_border = rgba(595959aa)
    resize_on_border = false

    # Please see https://wiki.hypr.land/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle
}

# https://wiki.hypr.land/Configuring/Variables/#decoration
decoration {
    rounding = 4
    rounding_power = 2

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 1.0

    dim_special = 0

    shadow {
        enabled = true
        range = 1
        render_power = 3
        color = rgba(1a1a1aee)
    }

    # https://wiki.hypr.land/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 3
        passes = 1

        vibrancy = 0.1696
    }
}

# https://wiki.hypr.land/Configuring/Variables/#group
group {
    col.border_active = rgba(7aa2f7ee) rgba(c0caf5ee) 45deg
    col.border_inactive = rgba(595959aa)
    col.border_locked_active = rgba(7aa2f7ee) rgba(c0caf5ee) 45deg
    col.border_locked_inactive = rgba(595959aa)

    groupbar {
        render_titles = true
        font_family = JetBrainsMono Nerd Font
        font_size = 10
        height = 14
        text_color = rgba(c0caf5ee)
        col.active = rgba(7aa2f7ff)
        col.inactive = rgba(24283b88)
        col.locked_active = rgba(7aa2f7ff)
        col.locked_inactive = rgba(24283b88)
    }
}

# https://wiki.hypr.land/Configuring/Variables/#animations
animations {
    enabled = yes, please :)

    # Default curves, see https://wiki.hypr.land/Configuring/Animations/#curves
    #        NAME,          who created the Desktop folder in  X0,   Y0,   X1,   Y1
    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    # Default animations, see https://wiki.hypr.land/Configuring/Animations/
    #           NAME,          ONOFF, SPEED, CURVE,        [STYLE]

    animation = global,        1,     10,    default
    animation = border,        1,     5.39,  easeOutQuint
    animation = windows,       1,     4.79,  easeOutQuint
    animation = windowsIn,     1,     4.1,   easeOutQuint, popin 87%
    animation = windowsOut,    1,     1.49,  linear,       popin 87%
    animation = fadeIn,        1,     1.73,  almostLinear
    animation = fadeOut,       1,     1.46,  almostLinear
    animation = fade,          1,     3.03,  quick
    animation = layers,        1,     3.81,  easeOutQuint
    animation = layersIn,      1,     4,     easeOutQuint, fade
    animation = layersOut,     1,     1.5,   linear,       fade
    animation = fadeLayersIn,  1,     1.79,  almostLinear
    animation = fadeLayersOut, 1,     1.39,  almostLinear
    animation = workspaces,    1,     1.94,  almostLinear, fade
    animation = workspacesIn,  1,     1.21,  almostLinear, fade
    animation = workspacesOut, 1,     1.94,  almostLinear, fade
    animation = specialWorkspace, 1, 3, easeOutQuint, slidevert
    animation = zoomFactor,    1,     7,     quick
}

layerrule = no_anim 1, match:namespace ^selection$

# Floating / Dialogs
windowrule {
    name = system-dialog
    match:title = ^(All Files|Open File|Select a File|Choose wallpaper|Open Folder|Save As|Save File|Library|File Upload).*$
    center = on
    float = on
    group = deny
}

windowrule {
    name = save-open-dialog
    match:title = ^.*wants to (save|open)$
    float = on
    center = on
    group = deny
}

windowrule {
    name = misc-floats
    match:title = ^.*(Welcome|Shell conflicts).*$
    float = on
    group = deny
}

windowrule {
    name = feh
    match:class = ^feh$
    float = on
    center = on
    group = deny
}

windowrule = float on, match:class ^org.openrgb.OpenRGB$

windowrule {
    name = satty
    match:class = ^com.gabm.satty$
    float = yes
    center = yes
}

# Bitwarden (extension)
windowrule {
    name = bitwarden
    match:class = ^chrome-nngceckbapebfimnlniiiahkandclblb.*$
    float = yes
    group = deny
    keep_aspect_ratio = 1
    move = (monitor_w*0.79) (monitor_h*0.11)
    size = 400 600
}

# Discord
windowrule {
    name = discord
    match:class = ^discord$
    workspace = special:Discord silent
    fullscreen = on
}

# Helium DevTools
windowrule {
    name = helium-devtools
    match:class = ^helium$
    match:title = ^DevTools$
    float = yes
    center = yes
    group = deny
}

# LibrePods
windowrule {
    name = librepods
    match:title = ^LibrePods$
    float = yes
}

# Lutris
windowrule {
    name = lutris
    match:class = ^net.lutris.Lutris$
    pseudo = 1
    size = 1200 700
}

# Nemo 
windowrule {
    name = nemo-dialogs
    match:class = ^nemo$
    match:title = ^.*(Properties|Preferences)$
    float = yes
    center = yes
}

# Neovim
windowrule {
    name = nvim-floating
    match:initial_title = ^nvim-float$
    float = yes
    center = yes
    size = (monitor_w*0.75) (monitor_h*0.75)
}

# PavuControl (Volume Control) 
windowrule {
    name = pavucontrol
    match:class = ^(pavucontrol|org.pulseaudio.pavucontrol)$
    float = yes
    size = 600 300
    move = (monitor_w*0.68) (monitor_h*0.026)
    pin = on
}

# Picture in Picture (PiP)
windowrule {
    name = pip
    match:title = ^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture)(.*)$
    float = yes
    keep_aspect_ratio = 1
    move = (monitor_w*0.74) (monitor_h*0.73)
    size = (monitor_w*0.25) (monitor_h*0.25)
    pin = on
    group = deny
}

# Custom Quake Terminal
windowrule {
    name = quake-terminal
    match:initial_title = ^quake-terminal$
    workspace = special:quake silent
    float = yes
    dim_around = on
    size = (monitor_w*0.45) (monitor_h*0.275)
    move = (monitor_w*0.275) (monitor_h*0.8)
    rounding = 15
}

# Steam
windowrule {
    name = steam-default
    match:class = ^[Ss]team$
    float = yes
    center = yes
    group = deny
}

windowrule {
    name = steam-main
    match:class = ^[Ss]team$
    match:title = ^Steam$
    match:initial_title = ^Steam$
    float = no
    group = unset
}

windowrule {
    name = steam-friends
    match:class = ^[Ss]team$
    match:title = ^Friends List$
    size = (monitor_w*0.2) (monitor_h*1.0)
    float = no
    group = deny
}

# Timeshift
windowrule {
    name = timeshift
    match:class = ^timeshift-gtk$
    float = yes
    center = yes
}

# Waydroid-helper
windowrule {
    name = waydroid-helper
    match:title = ^waydroid-helper$
    float = yes
    center = yes
}

# Zathura
windowrule {
    name = zathura
    match:class = ^org.pwmt.zathura$
    float = yes
    size = 1880 1016
    center = yes
}

# Ref https://wiki.hypr.land/Configuring/Workspace-Rules/
# "Smart gaps" / "No gaps when only"
# uncomment all if you wish to use that.
#workspace = w[tv1], gapsout:0, gapsin:0
#workspace = f[1], gapsout:0, gapsin:0 
#windowrule = bordersize 0, floating:0, onworkspace:w[tv1]
#windowrule = rounding 0, floating:0, onworkspace:w[tv1]
#windowrule = bordersize 0, floating:0, onworkspace:f[1]
#windowrule = rounding 0, floating:0, onworkspace:f[1]

# https://https://wiki.hypr.land/Configuring/Scrolling-Layout/ for more
scrolling {
    column_width = 0.5
    fullscreen_on_one_column = true
    focus_fit_method = 1
    follow_focus = true
}

# See https://wiki.hypr.land/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = false
    preserve_split = true
    smart_resizing = true
}

# See https://wiki.hypr.land/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hypr.land/Configuring/Variables/#misc
misc {
    force_default_wallpaper = -1 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = true # If true disables the random hyprland logo / anime girl background. :(
    disable_splash_rendering = true
    middle_click_paste = false
    exit_window_retains_fullscreen = false
}


#############
### INPUT ###
#############

# https://wiki.hypr.land/Configuring/Variables/#input
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
    accel_profile = flat
    force_no_accel = 1
    
    scroll_method = on_button_down
    scroll_button = 274
  
    touchpad {
        natural_scroll = false
    }
}

# See https://wiki.hypr.land/Configuring/Gestures
gesture = 3, horizontal, workspace

# Example per-device config
# See https://wiki.hypr.land/Configuring/Keywords/#per-device-input-configs for more
device {
    name = razer-razer-viper-ultimate-dongle
    sensitivity = 0
}


###################
### KEYBINDINGS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER 

# Reload Hyprland
bind = $mainMod CONTROL, R, exec, hyprctl reload

# Reload Quickshell
bind = $mainMod CONTROL, Q, exec, quickshell ipc call shell softReload

# Key Passthrough (Toggle SUPER+F1 to send all keys to VM)
bind = $mainMod, F1, exec, notify-send -t 1500 "Passthrough Mode" "Host shortcuts DISABLED"
bind = $mainMod, F1, submap, passthrough
submap = passthrough
bind = $mainMod, F1, exec, notify-send -t 1500 "Passthrough Mode" "Host shortcuts ENABLED"
bind = $mainMod, F1, submap, reset
submap = reset

# Screenshot
bind = $mainMod SHIFT, S, exec, grim -g "$(slurp -o -r -c '##ff0000ff')" -t ppm - | satty --filename - --output-filename ~/Pictures/Screenshots/$(date '+%Y%m%d-%H:%M:%S').png

# Instant Fullscreen Screenshot to Clipboard
bind = $mainMod SHIFT CONTROL, S, exec, grim - | wl-copy

# Window-only Screenshot
bind = $mainMod CONTROL, S, exec, ~/.config/hypr/scripts/window_screenshot.sh

# Rofi
bind = $mainMod, RETURN, exec, "$menu"

# Main Browser
bind = $mainMod, B, exec, ~/.config/hypr/scripts/helium-safe-launch --profile-directory="Default"

# Browser Selector
bind = $mainMod SHIFT, B, exec, ~/.config/hypr/scripts/helium-safe-launch 

# Terminal
bind = $mainMod, Q, exec, $terminal

# Quake Terminal Toggle
bind = $mainMod SHIFT, Q, togglespecialworkspace, quake

# Exit
bind = $mainMod SHIFT, ESCAPE, exec, uwsm stop

# Lock
bind = $mainMod SHIFT, L, exec, hyprlock

# Clipboard Manager (Text) - Win+V style
bind = $mainMod, V, exec, cliphist list | rofi -dmenu -display-columns 2 -show-icons -p "ґ░ЕЗ" | cliphist decode | wl-copy

# Clipboard Manager (Images)
bind = $mainMod SHIFT, V, exec, rofi -show яА╛ -modi "яА╛:~/.config/rofi/scripts/cliphist-images" -show-icons -display-columns 1 -theme ~/.config/rofi/themes/cliphist-images.rasi

# Emoji Picker - Win+. style
bind = $mainMod, PERIOD, exec, rofimoji --action copy

# Color Picker (hyprpickr)
bind = $mainMod SHIFT, P, exec, hyprpicker -a

# Messaging Workspace
bind = $mainMod, D, togglespecialworkspace, Discord
bind = $mainMod SHIFT, D, movetoworkspace, special:Discord

# Close any active special workspace
bind = $mainMod, escape, exec, ~/.config/hypr/scripts/close_special.sh

# Window
bind = $mainMod, W, killactive,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, SPACE, togglefloating,
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, S, layoutmsg, togglesplit # dwindle
bind = $mainMod SHIFT, F, fullscreen,

# Grouping
bind = $mainMod, G, togglegroup
bind = $mainMod, TAB, changegroupactive, f
bind = $mainMod SHIFT, G, moveoutofgroup

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# Swap windows with mainMod + SHIFT + arrow keys
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d

# Resize windows with mainMod + CONTROL + arrow keys
binde = $mainMod CONTROL, right, resizeactive, 10 0
binde = $mainMod CONTROL, left, resizeactive, -10 0
binde = $mainMod CONTROL, up, resizeactive, 0 -10
binde = $mainMod CONTROL, down, resizeactive, 0 10

binde = $mainMod CONTROL, l, resizeactive, 10 0
binde = $mainMod CONTROL, h, resizeactive, -10 0
binde = $mainMod CONTROL, k, resizeactive, 0 -10
binde = $mainMod CONTROL, j, resizeactive, 0 10

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
#bind = $mainMod, S, togglespecialworkspace, magic
#bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Volume Control / Media Keys
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 10%-

bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 10%+

bindl = , XF86AudioMute, exec, playerctl play-pause

bindl=, XF86MonBrightnessUp, exec, brightnessctl set 5%+

bindl=, XF86MonBrightnessDown, exec, brightnessctl set 5%-

bind=, XF86AudioNext, exec, playerctl next

bind=, XF86AudioPause, exec, playerctl pause

bind=, XF86AudioPlay, exec, playerctl play

bind=, XF86AudioPrev, exec, playerctl previous


