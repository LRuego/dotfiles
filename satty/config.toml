[general]
fullscreen = true
early-exit = true
corner-roundness = 0
initial-tool = "arrow"
copy-command = "wl-copy"
annotation-size-factor = 1
# output-filename = "/tmp/%Y%m%d-%H%M%S.png"
save-after-copy = false
default-hide-toolbars = false
focus-toggles-toolbars = false
default-fill-shapes = false
primary-highlighter = "block"
disable-notifications = false
actions-on-right-click = []
actions-on-enter = []
actions-on-escape = ["save-to-clipboard", "exit"]
no-window-decoration = true
brush-smooth-history-size = 0

# Keyboard Shortcuts
[keybinds]
pointer = "p"
crop = "c"
brush = "b"
line = "i"
arrow = "z"
rectangle = "r"
ellipse = "e"
text = "t"
marker = "m"
blur = "u"
highlight = "g"

[font]
family = "JetBrainsMono Nerd Font"
style = "Regular"

[color-palette]
palette = [
    "#ff0000",
    "#7aa2f7",
    "#bb9af7",
    "#9ece6a",
    "#e0af68",
    "#f7768e",
    "#7dcfff",
    "#c0caf5"
]

custom = [
    "#7aa2f7",
    "#bb9af7",
    "#9ece6a",
    "#e0af68",
    "#f7768e",
    "#7dcfff",
    "#c0caf5"
]
