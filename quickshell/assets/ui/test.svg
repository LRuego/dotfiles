<svg viewBox="0 0 100 70" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
    <defs>
        <linearGradient id="top" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#8ab4f8"/>
            <stop offset="100%" style="stop-color:#7aa2f7"/>
        </linearGradient>
        <linearGradient id="side" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#6a92e7"/>
            <stop offset="100%" style="stop-color:#5a82d7"/>
        </linearGradient>
        <filter id="keyshadow">
            <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
            <feOffset dx="0" dy="4" result="offsetblur"/>
            <feComponentTransfer>
                <feFuncA type="linear" slope="0.4"/>
            </feComponentTransfer>
            <feMerge>
                <feMergeNode/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>
    
    <!-- Shadow -->
    <ellipse cx="50" cy="66" rx="40" ry="5" fill="#00000030"/>
    
    <!-- Keycap body -->
    <path d="M 15,12 L 85,12 L 90,17 L 90,53 L 85,58 L 15,58 L 10,53 L 10,17 Z" 
          fill="url(#top)" 
          stroke="#5a82d7" 
          stroke-width="2"
          filter="url(#keyshadow)"/>
    
    <!-- Right side face -->
    <path d="M 85,12 L 90,17 L 90,53 L 85,58" fill="url(#side)" opacity="0.7"/>
    
    <!-- Bottom edge -->
    <path d="M 15,58 L 85,58 L 90,53 L 10,53" fill="#00000020"/>
    
    <!-- Top highlight -->
    <path d="M 15,12 L 85,12 L 90,17 L 10,17" fill="#ffffff" opacity="0.4"/>
</svg>
