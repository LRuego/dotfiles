<svg viewBox="0 0 120 140" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="top-enter" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#8ab4f8"/>
            <stop offset="100%" style="stop-color:#7aa2f7"/>
        </linearGradient>
        <linearGradient id="side-enter" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#6a92e7"/>
            <stop offset="100%" style="stop-color:#5a82d7"/>
        </linearGradient>
        <filter id="keyshadow-enter">
            <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
            <feOffset dx="0" dy="4" result="offsetblur"/>
            <feComponentTransfer>
                <feFuncA type="linear" slope="0.4"/>
            </feComponentTransfer>
            <feMerge>
                <feMergeNode/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>
    
    <!-- Shadow -->
    <ellipse cx="50" cy="132" rx="45" ry="6" fill="#00000030"/>
    
    <!-- ISO Enter shape: wide top, narrow vertical stem -->
    <path d="M 15,12 L 105,12 L 110,17 L 110,53 L 105,58 
             L 55,58 L 50,63 L 50,123 L 45,128 
             L 15,128 L 10,123 L 10,17 Z" 
          fill="url(#top-enter)" 
          stroke="#5a82d7" 
          stroke-width="2"
          filter="url(#keyshadow-enter)"/>
    
    <!-- Right side face (top horizontal part) -->
    <path d="M 105,12 L 110,17 L 110,53 L 105,58" fill="url(#side-enter)" opacity="0.7"/>
    
    <!-- Right side face (vertical stem) -->
    <path d="M 45,63 L 50,63 L 50,123 L 45,128" fill="url(#side-enter)" opacity="0.7"/>
    
    <!-- Bottom edge (vertical stem) -->
    <path d="M 15,128 L 45,128 L 50,123 L 10,123" fill="#00000020"/>
    
    <!-- Step edge where horizontal meets vertical -->
    <path d="M 50,63 L 55,58 L 105,58 L 105,53 L 50,53" fill="#00000020"/>
    
    <!-- Top highlight -->
    <path d="M 15,12 L 105,12 L 110,17 L 10,17" fill="#ffffff" opacity="0.4"/>
</svg>
